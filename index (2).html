<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>RECO 專屬</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            width: 100vw;
            min-height: 100vh;
            overflow-x: hidden;
        }
        body {
            min-height: 100vh;
            width: 100vw;
            position: relative;
            /* 華麗背景：漸層+星點+光暈 */
            background: radial-gradient(ellipse at 50% 30%, #fffbe6 0%, #ffeaa7 40%, #fab1a0 80%, #636e72 100%);
        }
        /* 星點效果 */
        body::before {
            content: '';
            position: fixed;
            left: 0; top: 0;
            width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 0;
            background:
                radial-gradient(circle, #fff 1px, transparent 1.5px) 10vw 10vh/120px 120px repeat,
                radial-gradient(circle, #fff9c4 1.5px, transparent 2px) 50vw 60vh/180px 180px repeat,
                radial-gradient(circle, #ffeaa7 1.5px, transparent 2px) 80vw 30vh/200px 200px repeat;
            opacity: 0.25;
        }
        /* 光暈效果 */
        body::after {
            content: '';
            position: fixed;
            left: 50%; top: 10%;
            width: 60vw; height: 60vw;
            pointer-events: none;
            z-index: 0;
            transform: translate(-50%, 0);
            background: radial-gradient(circle, #fff9c4 0%, #ffeaa7 40%, transparent 80%);
            opacity: 0.18;
            filter: blur(8px);
        }
        .watermark {
            position: fixed;
            left: 0;
            top: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .watermark-text {
            font-family: Impact, Arial Black, 微軟正黑體, sans-serif;
            font-size: 15vw;
            color: #d35400;
            opacity: 0.13;
            font-weight: bold;
            letter-spacing: 0.2em;
            text-shadow:
                0 0 60px #fdcb6e,
                0 0 80px #636e72,
                0 2px 22px #fdcb6e,
                2px 2px 0 #fff,
                0 0 0 #000;
            user-select: none;
            transform: rotate(-18deg) scale(1.2);
            white-space: nowrap;
        }
        .container {
            width: 100vw;
            min-height: 100vh;
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        h1 {
            text-align: center;
            color: #2d3436;
            margin-top: 40px;
            letter-spacing: 2px;
            font-size: 2.5em;
            z-index: 2;
            text-shadow: 0 2px 16px #ffeaa7, 0 0 8px #fdcb6e;
        }
        .input-area {
            text-align: center;
            margin-top: 40px;
            z-index: 2;
        }
        #singleInput {
            width: 260px;
            padding: 10px;
            font-size: 18px;
            border-radius: 6px;
            border: 1px solid #b2bec3;
            margin-bottom: 10px;
        }
        #addNameBtn {
            padding: 10px 24px;
            font-size: 18px;
            background: #0984e3;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-left: 10px;
            transition: background 0.2s;
            box-shadow: 0 2px 8px #b2bec3;
        }
        #addNameBtn:hover {
            background: #74b9ff;
        }
        .main-area {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            margin-top: 60px;
            z-index: 2;
        }
        .wheel-area {
            position: relative;
            width: 420px;
            height: 420px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        #wheel {
            width: 400px;
            height: 400px;
            display: block;
            margin: 0 auto;
            background: transparent;
            border-radius: 50%;
            box-shadow: 0 4px 24px #dfe6e9, 0 0 40px #ffeaa7;
            z-index: 2;
        }
        /* 美化箭頭 */
        .arrow-down {
            position: absolute;
            left: 100%;
            top: 50%;
            transform: translateY(-50%) rotate(90deg);
            font-size: 80px;
            color: #e17055;
            font-weight: bold;
            text-shadow: 2px 2px 18px #636e72, 0 0 32px #fdcb6e;
            user-select: none;
            z-index: 10;
            letter-spacing: 0.1em;
            pointer-events: none;
            line-height: 1;
        }
        #spinBtn {
            margin: 48px auto 0 auto;
            display: block;
            padding: 18px 60px;
            font-size: 22px;
            background: linear-gradient(90deg, #00b894, #00cec9);
            color: #fff;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 2px 16px #fdcb6e;
            transition: background 0.2s;
            z-index: 2;
        }
        #spinBtn:hover {
            background: linear-gradient(90deg, #00cec9, #00b894);
        }
        .names-box {
            margin-left: 120px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 8px #dfe6e9;
            padding: 24px 32px;
            min-width: 220px;
            min-height: 300px;
            font-size: 18px;
            z-index: 2;
        }
        .names-box h3 {
            margin-top: 0;
            color: #636e72;
            font-size: 20px;
            margin-bottom: 12px;
        }
        .names-list {
            color: #0984e3;
            word-break: break-all;
        }
        .name-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }
        .delete-btn {
            margin-left: 12px;
            padding: 2px 10px;
            font-size: 15px;
            background: #d63031;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .delete-btn:hover {
            background: #ff7675;
        }
        .record-box {
            margin: 120px auto 0 auto;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 8px #dfe6e9;
            padding: 24px 32px;
            min-width: 320px;
            max-width: 500px;
            font-size: 18px;
            text-align: left;
            z-index: 2;
        }
        .record-box h3 {
            margin-top: 0;
            color: #636e72;
            font-size: 20px;
            margin-bottom: 12px;
        }
        .record-list {
            color: #d35400;
            word-break: break-all;
        }
        @media (max-width: 1200px) {
            .main-area {
                flex-direction: column;
                align-items: center;
            }
            .names-box {
                margin-left: 0;
                margin-top: 32px;
                min-width: 180px;
            }
            .arrow-down {
                left: 50%;
                top: 100%;
                transform: translate(-50%, 0) rotate(180deg);
            }
        }
        @media (max-width: 600px) {
            .container {
                padding: 0 2vw;
            }
            .main-area {
                margin-top: 20px;
            }
            .wheel-area {
                width: 100vw;
                height: auto;
            }
            #wheel {
                width: 90vw;
                height: 90vw;
                max-width: 400px;
                max-height: 400px;
            }
            .arrow-down {
                font-size: 12vw;
                left: 100%;
                top: 50%;
                transform: translateY(-50%) rotate(90deg);
            }
            .names-box {
                min-width: 120px;
                padding: 12px 8px;
            }
            .record-box {
                min-width: 120px;
                padding: 12px 8px;
            }
        }
    </style>
</head>
<body>
    <!-- 浮誇霸氣浮水印 -->
    <div class="watermark">
        <span class="watermark-text">RECO</span>
    </div>
    <div class="container">
        <h1>RECO 專屬</h1>
        <div class="input-area">
            <input id="singleInput" type="text" placeholder="請輸入名稱">
            <button id="addNameBtn">新增名稱</button>
        </div>
        <div class="main-area">
            <div class="wheel-area">
                <canvas id="wheel" width="400" height="400"></canvas>
                <div class="arrow-down">↓</div>
            </div>
            <div class="names-box">
                <h3>已輸入名稱</h3>
                <div class="names-list" id="namesList"></div>
            </div>
        </div>
        <button id="spinBtn">旋轉！</button>
        <div class="record-box">
            <h3>中獎紀錄</h3>
            <div class="record-list" id="recordList"></div>
        </div>
    </div>
    <!-- 中獎彈窗 -->
    <div id="popup" style="display:none; position:fixed; left:0; top:0; width:100vw; height:100vh; background:rgba(0,0,0,0.25); z-index:9999; align-items:center; justify-content:center;">
        <div style="background:#fff; padding:40px 60px; border-radius:16px; box-shadow:0 4px 24px #636e72; text-align:center; font-size:2em; color:#d35400; font-weight:bold;">
            <span id="popupName"></span>
            <br>
            <button onclick="closePopup()" style="margin-top:28px; padding:10px 32px; font-size:1em; background:#00b894; color:#fff; border:none; border-radius:8px; cursor:pointer;">關閉</button>
        </div>
    </div>
    <!-- 音效 -->
    <audio id="winSound" src="https://cdn.pixabay.com/audio/2022/10/16/audio_12b6fae1b2.mp3"></audio>
    <script>
        let options = ['小明', '小華', '小美', '小強', '小芳', '小王'];
        let records = [];
        let startAngle = 0;
        let arc = Math.PI * 2 / options.length;
        let spinTimeout = null;
        let spinAngleStart = 0;
        let spinTime = 0;
        let spinTimeTotal = 0;
        let ctx;
        let isSpinning = false;

        function drawRouletteWheel() {
            let canvas = document.getElementById("wheel");
            if (canvas.getContext) {
                ctx = canvas.getContext("2d");
                let outsideRadius = canvas.width/2 - 10;
                let textRadius = outsideRadius - 40;
                let insideRadius = 70;

                ctx.clearRect(0,0,canvas.width,canvas.height);

                arc = Math.PI * 2 / options.length;

                // 外圈立體漸層
                let grad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, outsideRadius-10, canvas.width/2, canvas.height/2, outsideRadius+10);
                grad.addColorStop(0, "#ffeaa7");
                grad.addColorStop(0.5, "#fab1a0");
                grad.addColorStop(1, "#d35400");
                ctx.save();
                ctx.beginPath();
                ctx.arc(canvas.width/2, canvas.height/2, outsideRadius+10, 0, Math.PI*2, false);
                ctx.arc(canvas.width/2, canvas.height/2, outsideRadius-10, Math.PI*2, 0, true);
                ctx.closePath();
                ctx.fillStyle = grad;
                ctx.shadowColor = "#fdcb6e";
                ctx.shadowBlur = 18;
                ctx.fill();
                ctx.restore();

                // 彩色區塊
                let colors = [
                    "#fdcb6e", "#00b894", "#00bfff", "#d35400", "#a29bfe", "#fab1a0", "#e17055", "#636e72", "#fd79a8", "#81ecec"
                ];

                for(let i = 0; i < options.length; i++) {
                    let angle = startAngle + i * arc;
                    ctx.save();
                    // 區塊漸層
                    let sectorGrad = ctx.createLinearGradient(
                        canvas.width/2 + Math.cos(angle) * outsideRadius,
                        canvas.height/2 + Math.sin(angle) * outsideRadius,
                        canvas.width/2 + Math.cos(angle + arc) * outsideRadius,
                        canvas.height/2 + Math.sin(angle + arc) * outsideRadius
                    );
                    sectorGrad.addColorStop(0, colors[i % colors.length]);
                    sectorGrad.addColorStop(1, "#fffbe6");
                    ctx.fillStyle = sectorGrad;

                    ctx.beginPath();
                    ctx.arc(canvas.width/2, canvas.height/2, outsideRadius, angle, angle + arc, false);
                    ctx.arc(canvas.width/2, canvas.height/2, insideRadius, angle + arc, angle, true);
                    ctx.closePath();
                    ctx.shadowColor = "#b2bec3";
                    ctx.shadowBlur = 4;
                    ctx.fill();
                    ctx.restore();

                    ctx.save();
                    ctx.fillStyle = "#2d3436";
                    ctx.font = "bold 20px Microsoft JhengHei";
                    ctx.translate(canvas.width/2 + Math.cos(angle + arc / 2) * textRadius,
                                  canvas.height/2 + Math.sin(angle + arc / 2) * textRadius);
                    ctx.rotate(angle + arc / 2 + Math.PI / 2);
                    let text = options[i];
                    ctx.fillText(text, -ctx.measureText(text).width / 2, 0);
                    ctx.restore();
                }

                // 中心圓（立體光暈）
                ctx.save();
                let centerGrad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 10, canvas.width/2, canvas.height/2, insideRadius);
                centerGrad.addColorStop(0, "#fffbe6");
                centerGrad.addColorStop(0.6, "#ffeaa7");
                centerGrad.addColorStop(1, "#fab1a0");
                ctx.beginPath();
                ctx.arc(canvas.width/2, canvas.height/2, insideRadius, 0, Math.PI * 2, false);
                ctx.fillStyle = centerGrad;
                ctx.shadowColor = "#fdcb6e";
                ctx.shadowBlur = 20;
                ctx.fill();
                ctx.restore();

                // 中心RECO字樣美化
                ctx.save();
                ctx.font = "bold 44px Impact, Arial Black, 微軟正黑體, sans-serif";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.lineWidth = 6;
                ctx.strokeStyle = "#d35400";
                ctx.shadowColor = "#fdcb6e";
                ctx.shadowBlur = 18;
                ctx.strokeText("RECO", canvas.width/2, canvas.height/2);
                ctx.shadowBlur = 0;
                ctx.fillStyle = "#2d3436";
                ctx.fillText("RECO", canvas.width/2, canvas.height/2);
                ctx.restore();
            }
        }

        function rotateWheel() {
            spinAngleStart = Math.random() * 10 + 15;
            spinTime = 0;
            spinTimeTotal = Math.random() * 2000 + 3000;
            isSpinning = true;
            rotate();
        }

        function rotate() {
            spinTime += 30;
            if(spinTime >= spinTimeTotal) {
                stopRotateWheel();
                return;
            }
            let spinAngle = spinAngleStart - easeOut(spinTime, 0, spinAngleStart, spinTimeTotal);
            startAngle += (spinAngle * Math.PI / 180);
            drawRouletteWheel();
            spinTimeout = setTimeout(rotate, 30);
        }

        function stopRotateWheel() {
            clearTimeout(spinTimeout);
            // 箭頭現在指向正右側，修正角度為0度
            let degrees = startAngle * 180 / Math.PI + 0;
            let arcd = arc * 180 / Math.PI;
            let index = Math.floor((360 - (degrees % 360)) / arcd) % options.length;
            let winner = options[index];
            showPopup(winner);
            document.getElementById("winSound").play();
            records.unshift(winner);
            updateRecordList();
            isSpinning = false;
        }

        function easeOut(t, b, c, d) {
            let ts = (t/=d)*t;
            let tc = ts*t;
            return b+c*(tc + -3*ts + 3*t);
        }

        document.getElementById("spinBtn").addEventListener("click", function(){
            if(!isSpinning && options.length > 1) {
                rotateWheel();
            }
        });

        document.getElementById("addNameBtn").addEventListener("click", function(){
            let input = document.getElementById("singleInput");
            let name = input.value.trim();
            if(name === "") return;
            if(options.includes(name)) {
                alert("名稱已存在！");
                return;
            }
            options.push(name);
            input.value = "";
            startAngle = 0;
            drawRouletteWheel();
            updateNamesList();
        });

        document.getElementById("singleInput").addEventListener("keydown", function(e){
            if(e.key === "Enter") {
                document.getElementById("addNameBtn").click();
            }
        });

        function updateNamesList() {
            let html = options.map((n, i) => `
                <div class="name-item">
                    <span>${i+1}. ${n}</span>
                    <button class="delete-btn" onclick="deleteName(${i})">刪除</button>
                </div>
            `).join("");
            document.getElementById("namesList").innerHTML = html;
        }
        function updateRecordList() {
            document.getElementById("recordList").innerHTML = records.map((n, i) => (i+1) + ". " + n).join("<br>");
        }

        // 刪除名稱
        window.deleteName = function(idx) {
            options.splice(idx,1);
            startAngle = 0;
            drawRouletteWheel();
            updateNamesList();
        }

        // 彈窗
        function showPopup(name) {
            document.getElementById("popupName").innerText = "中獎：" + name;
            document.getElementById("popup").style.display = "flex";
        }
        function closePopup() {
            document.getElementById("popup").style.display = "none";
        }
        window.closePopup = closePopup;

        // 初始化
        drawRouletteWheel();
        updateNamesList();
        updateRecordList();
    </script>
</body>
</html>
